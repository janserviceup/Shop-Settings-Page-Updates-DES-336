<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Settings Dialog — MUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@mui/material@5/umd/material-ui.production.min.js" crossorigin></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; }
    html, body, #root { height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {
      Box, Dialog, DialogTitle, DialogContent, DialogActions,
      TextField, Button, IconButton, Typography, LinearProgress, Chip,
      Select, MenuItem, FormControl, InputLabel, Checkbox, FormControlLabel,
      Divider, Paper, Stack, Collapse, styled, createTheme, ThemeProvider,
      Radio, RadioGroup, FormLabel, Grid,
    } = MaterialUI;

    const theme = createTheme({
      palette: {
        primary: { main: '#FC6432' },
        secondary: { main: '#6B7280' },
        success: { main: '#22C55E' },
        text: { primary: '#1A1A1A', secondary: '#6B7280' },
      },
      typography: { fontFamily: '"DM Sans", sans-serif' },
      shape: { borderRadius: 8 },
      components: {
        MuiButton: { styleOverrides: { root: { textTransform: 'none', fontWeight: 600 } } },
        MuiTextField: { defaultProps: { size: 'small', fullWidth: true, variant: 'outlined' } },
        MuiOutlinedInput: {
          styleOverrides: {
            root: {
              borderRadius: 8,
              '&:hover .MuiOutlinedInput-notchedOutline': { borderColor: '#D1D5DB' },
              '&.Mui-focused .MuiOutlinedInput-notchedOutline': { borderColor: '#FC6432', borderWidth: 2 },
            },
            notchedOutline: { borderColor: '#E5E7EB' },
          },
        },
        MuiInputLabel: {
          styleOverrides: {
            root: { color: '#9CA3AF', '&.Mui-focused': { color: '#FC6432' } },
          },
        },
      },
    });

    /* ── Step circle component ── */
    function StepCircle({ number, status }) {
      if (status === 'completed') {
        return (
          <Box sx={{
            width: 32, height: 32, borderRadius: '50%', bgcolor: '#FC6432',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <span className="material-icons-outlined" style={{ fontSize: 20, color: '#fff' }}>check</span>
          </Box>
        );
      }
      return (
        <Box sx={{
          width: 32, height: 32, borderRadius: '50%',
          bgcolor: '#FC6432',
          display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          opacity: status === 'active' ? 1 : 0.85,
        }}>
          <Typography sx={{ color: '#fff', fontSize: 14, fontWeight: 700, lineHeight: 1 }}>{number}</Typography>
        </Box>
      );
    }

    /* ── Step data ── */
    const stepsData = [
      {
        label: 'Account Details',
        description: 'Contact info, legal name, shop type — how ServiceUp reaches you',
        fields: (
          <Stack spacing={2.5}>
            <Stack direction="row" spacing={2}>
              <TextField label="Primary Email" defaultValue="Jan Morris" />
              <TextField label="Primary Phone" defaultValue="(512)-555-0147" />
            </Stack>
            <TextField label="Shop Legal Name" defaultValue="Jan's Best Shop" fullWidth />
            <TextField label="Contact Name" defaultValue="Jan Morris" fullWidth />
            <TextField label="Street Address" defaultValue="4521 Research Blvd" fullWidth />
            <Stack direction="row" spacing={2}>
              <TextField label="City" defaultValue="Austin" />
              <FormControl fullWidth size="small">
                <InputLabel>State</InputLabel>
                <Select label="State" defaultValue="Texas">
                  <MenuItem value="Texas">Texas</MenuItem>
                  <MenuItem value="California">California</MenuItem>
                  <MenuItem value="New York">New York</MenuItem>
                  <MenuItem value="Florida">Florida</MenuItem>
                </Select>
              </FormControl>
              <TextField label="Zip" defaultValue="78751" />
            </Stack>
          </Stack>
        ),
      },
      {
        label: 'Shop Details',
        description: 'Vehicle types your shop can service — sets which orders you receive',
        fields: 'SHOP_DETAILS_PLACEHOLDER',
        requiresValidation: true,
      },
      {
        label: 'Services Offered',
        description: 'Service categories your shop performs — filters irrelevant requests',
        fields: 'SERVICES_PLACEHOLDER',
        requiresValidation: true,
      },
      {
        label: 'Rates',
        description: 'Mechanical, mobile, and body & paint rates — pre-filters jobs by value',
        fields: (
          <Stack spacing={3}>
            {/* Info banner */}
            <Box sx={{
              display: 'flex', alignItems: 'flex-start', gap: 1.5,
              bgcolor: '#EFF6FF', border: '1px solid #BFDBFE', borderRadius: 0, px: 2.5, py: 2,
            }}>
              <span className="material-icons-outlined" style={{ fontSize: 20, color: '#3B82F6', flexShrink: 0, marginTop: 1 }}>info</span>
              <Typography variant="body2" sx={{ color: '#1E40AF', lineHeight: 1.6 }}>
                These rates are displayed to customers on the marketplace. You can update them anytime from your profile settings.
              </Typography>
            </Box>

            {/* Rate fields — 2-column grid with $ prefix */}
            <Grid container spacing={2}>
              {[
                ['Mechanical Rate', '120.00'],
                ['Body Rate', '80.00'],
                ['Mobile Repair Rate', '120.00'],
                ['Paint Labor', '80.00'],
                ['Structural Labor', '120.00'],
                ['Diagnostic Labor', '80.00'],
              ].map(([label, value]) => (
                <Grid item xs={6} key={label}>
                  <TextField
                    label={label}
                    defaultValue={value}
                    InputProps={{
                      startAdornment: (
                        <Typography sx={{ color: '#6B7280', mr: 0.5, fontSize: 14 }}>$</Typography>
                      ),
                    }}
                  />
                </Grid>
              ))}
            </Grid>

            {/* Parts Discount */}
            <FormControl component="fieldset">
              <FormLabel component="legend" sx={{ fontWeight: 600, fontSize: 15, color: '#FC6432', mb: 0.5,
                '&.Mui-focused': { color: '#FC6432' } }}>
                Do you offer a Parts Discount?
              </FormLabel>
              <Typography variant="body2" color="text.secondary" sx={{ mb: 1.5 }}>
                Customers will see that you offer discounted parts pricing.
              </Typography>
              <RadioGroup row defaultValue="yes">
                <FormControlLabel value="yes" label="Yes"
                  control={<Radio size="small" sx={{ '&.Mui-checked': { color: '#FC6432' } }} />} sx={{ mr: 3 }} />
                <FormControlLabel value="no" label="No"
                  control={<Radio size="small" sx={{ '&.Mui-checked': { color: '#FC6432' } }} />} />
              </RadioGroup>
            </FormControl>
          </Stack>
        ),
      },
      {
        label: 'Hours',
        description: 'Shop Operating hours — jobs only arrive when you\'re open',
        fields: (() => {
          const timeSlots = [];
          for (let h = 0; h < 24; h++) {
            for (let m = 0; m < 60; m += 30) {
              const hour12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
              const ampm = h < 12 ? 'AM' : 'PM';
              const min = m === 0 ? '00' : '30';
              timeSlots.push(`${hour12}:${min} ${ampm}`);
            }
          }
          return (
            <Stack spacing={2}>
              {['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].map(day => (
                <Stack key={day} direction="row" alignItems="center" spacing={2}>
                  <Typography variant="body2" fontWeight={500} sx={{ width: 100, flexShrink: 0 }}>{day}</Typography>
                  <FormControl fullWidth size="small">
                    <InputLabel>Open At (CDT)</InputLabel>
                    <Select label="Open At (CDT)" defaultValue="8:00 AM"
                      endAdornment={
                        <span className="material-icons-outlined" style={{ fontSize: 20, color: '#9CA3AF', marginRight: 12 }}>schedule</span>
                      }
                      MenuProps={{ PaperProps: { sx: { maxHeight: 240 } } }}
                    >
                      {timeSlots.map(t => <MenuItem key={t} value={t}>{t}</MenuItem>)}
                    </Select>
                  </FormControl>
                  <FormControl fullWidth size="small">
                    <InputLabel>Close At (CDT)</InputLabel>
                    <Select label="Close At (CDT)" defaultValue="6:00 PM"
                      endAdornment={
                        <span className="material-icons-outlined" style={{ fontSize: 20, color: '#9CA3AF', marginRight: 12 }}>schedule</span>
                      }
                      MenuProps={{ PaperProps: { sx: { maxHeight: 240 } } }}
                    >
                      {timeSlots.map(t => <MenuItem key={t} value={t}>{t}</MenuItem>)}
                    </Select>
                  </FormControl>
                </Stack>
              ))}
            </Stack>
          );
        })(),
      },
    ];

    function App() {
      const [activeStep, setActiveStep] = React.useState(0);
      const [completedSteps, setCompletedSteps] = React.useState(new Set());
      const [showSettings, setShowSettings] = React.useState(false);
      const [showConfirmation, setShowConfirmation] = React.useState(false);
      const [selectedServices, setSelectedServices] = React.useState(new Set());
      const [selectedWeightClasses, setSelectedWeightClasses] = React.useState(new Set());

      const serviceCategories = [
        { name: 'Mechanical & Powertrain', examples: 'Engine Repair, Transmission, Fuel System, A/C, Exhaust' },
        { name: 'Preventative Maintenance', examples: 'Oil Changes, Tire Rotations, Fluid Services, Filters' },
        { name: 'Inspections & Diagnostics', examples: 'State Safety Inspection, DOT, Pre-Purchase, Emissions' },
        { name: 'Fleet & Speciality', examples: 'Fleet Upfitting, Telematics, Tow Hitch, Lift Gate Service' },
        { name: 'Electrical & ADAS', examples: 'Electrical Diagnostics, ADAS Collaboration, Battery' },
        { name: 'Detailing & Appearance', examples: 'Full Detail, Paint Correction, Ceramic Coating, Tint' },
        { name: 'Collision, Body & Glass', examples: 'Dent Repair, Frame Straightening, Windshield ...' },
        { name: 'Chassis, Brakes & Tires', examples: 'Brake Service, Wheel Alignment, Tire Replacement' },
      ];

      const toggleService = (name) => {
        setSelectedServices(prev => {
          const next = new Set(prev);
          if (next.has(name)) next.delete(name); else next.add(name);
          return next;
        });
      };

      const weightClasses = [
        'Class 1 (Passenger Cars, Small Pickups)',
        'Class 2 (Full-size Pickups, Large SUVs)',
        'Class 3 (Medium Pickups, Cargo Vans)',
        'Class 4 (City Delivery Trucks)',
        'Class 5 (Bucket Trucks, Large Vans)',
        'Class 6 (School Buses, Beverage Trucks)',
        'Class 7 (City Transit Buses, Refuse Trucks)',
        'Class 8 (Semi-Trucks, Large Dump Trucks)',
      ];

      const toggleWeightClass = (cls) => {
        setSelectedWeightClasses(prev => {
          const next = new Set(prev);
          if (next.has(cls)) next.delete(cls); else next.add(cls);
          return next;
        });
      };

      const renderShopDetailsFields = () => (
        <Stack spacing={3}>
          {/* Shop Type */}
          <FormControl component="fieldset">
            <FormLabel component="legend" sx={{ fontWeight: 600, fontSize: 15, color: '#1A1A1A', mb: 0.5,
              '&.Mui-focused': { color: '#1A1A1A' } }}>
              Shop Type <span style={{ color: '#FC6432' }}>*</span>
            </FormLabel>
            <Typography variant="body2" color="text.secondary" sx={{ mb: 1.5 }}>
              Select the category that best describes your shop's primary focus.
            </Typography>
            <RadioGroup row defaultValue="mechanical">
              {['Mechanical', 'Dealership', 'Collision', 'Mechanical/Collision'].map(type => (
                <FormControlLabel key={type} value={type.toLowerCase()} label={type}
                  control={<Radio size="small" sx={{ '&.Mui-checked': { color: '#FC6432' } }} />}
                  sx={{ mr: 3 }} />
              ))}
            </RadioGroup>
          </FormControl>

          {/* Mobile Vendor */}
          <FormControl component="fieldset">
            <FormLabel component="legend" sx={{ fontWeight: 600, fontSize: 15, color: '#1A1A1A', mb: 0.5,
              '&.Mui-focused': { color: '#1A1A1A' } }}>
              Mobile Vendor
            </FormLabel>
            <Typography variant="body2" color="text.secondary" sx={{ mb: 1.5 }}>
              Do you perform repairs at the customer's location?
            </Typography>
            <RadioGroup row defaultValue="yes">
              <FormControlLabel value="yes" label="Yes"
                control={<Radio size="small" sx={{ '&.Mui-checked': { color: '#FC6432' } }} />} sx={{ mr: 3 }} />
              <FormControlLabel value="no" label="No"
                control={<Radio size="small" sx={{ '&.Mui-checked': { color: '#FC6432' } }} />} />
            </RadioGroup>
          </FormControl>

          {/* Vehicle Weight Classes */}
          <FormControl component="fieldset">
            <FormLabel component="legend" sx={{ fontWeight: 600, fontSize: 15, color: '#1A1A1A', mb: 0.5,
              '&.Mui-focused': { color: '#1A1A1A' } }}>
              Vehicle Weight Classes <span style={{ color: '#FC6432' }}>*</span>
            </FormLabel>
            <Typography variant="body2" color="text.secondary" sx={{ mb: 2 }}>
              Select the vehicle weight classes your shop is equipped to service.
            </Typography>
            <Grid container spacing={1.5}>
              {weightClasses.map(cls => (
                <Grid item xs={6} key={cls}>
                  <FormControlLabel
                    control={<Checkbox checked={selectedWeightClasses.has(cls)} size="small"
                      sx={{ '&.Mui-checked': { color: '#FC6432' } }}
                      onChange={() => toggleWeightClass(cls)} />}
                    label={<Typography variant="body2">{cls}</Typography>}
                    sx={{ m: 0 }} />
                </Grid>
              ))}
            </Grid>
          </FormControl>
        </Stack>
      );

      const renderServicesFields = () => (
        <Stack spacing={0}>
          <Typography variant="body2" color="text.secondary" sx={{ mb: 2.5 }}>
            Select the service categories your shop offers. Expand a category to pick specific sub-categories.
          </Typography>
          <Stack spacing={1.5}>
            {serviceCategories.map((cat) => (
              <Box key={cat.name} sx={{
                display: 'flex', alignItems: 'center', py: 1.75, px: 2,
                border: '1px solid #E5E7EB',
                cursor: 'pointer',
                '&:hover': { bgcolor: '#FAFAFA', borderColor: '#D1D5DB' },
                transition: 'all 0.15s',
              }} onClick={() => toggleService(cat.name)}>
                <Checkbox checked={selectedServices.has(cat.name)} size="small"
                  sx={{ '&.Mui-checked': { color: '#FC6432' }, mr: 1.5, p: 0.5 }} />
                <Typography variant="body2" fontWeight={600} sx={{ flexShrink: 0, minWidth: 195 }}>{cat.name}</Typography>
                <Typography variant="body2" color="text.secondary" noWrap sx={{ flex: 1, fontSize: 13, mx: 2 }}>
                  E.g. {cat.examples}
                </Typography>
                <span className="material-icons-outlined" style={{ fontSize: 20, color: '#9CA3AF', flexShrink: 0 }}>expand_more</span>
              </Box>
            ))}
          </Stack>
        </Stack>
      );

      const isStepValid = (index) => {
        if (index === 1) return selectedWeightClasses.size > 0;
        if (index === 2) return selectedServices.size > 0;
        return true;
      };

      const handleNext = () => {
        setCompletedSteps(prev => new Set([...prev, activeStep]));
        if (activeStep < stepsData.length - 1) {
          setActiveStep(activeStep + 1);
        } else {
          // Last step — close settings, then show confirmation after transition
          setShowSettings(false);
          setTimeout(() => setShowConfirmation(true), 350);
        }
      };

      const handleBack = () => {
        if (activeStep > 0) setActiveStep(activeStep - 1);
      };

      const handleStepClick = (index) => {
        setActiveStep(prev => prev === index ? -1 : index);
      };

      const progress = (completedSteps.size / stepsData.length) * 100;

      const sidebarItems = [
        { icon: 'rocket_launch', label: 'Getting Started', active: true },
        { icon: 'desktop_windows', label: 'Active Orders', active: false },
        { icon: 'local_shipping', label: 'Closed Orders', active: false },
        { icon: 'groups', label: 'Staff', active: false },
      ];

      const settingsItems = [
        { icon: 'storefront', label: 'Shop Profile' },
        { icon: 'group', label: 'Staff' },
        { icon: 'person_outline', label: 'User Profile' },
      ];

      return (
        <ThemeProvider theme={theme}>
          <Box sx={{ display: 'flex', height: '100vh', bgcolor: '#fff' }}>
            {/* Sidebar */}
            <Box sx={{
              width: 200, flexShrink: 0, borderRight: '1px solid #E5E7EB',
              display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
              py: 2.5,
            }}>
              <Box>
                {/* Logo */}
                <Box sx={{ px: 2.5, mb: 3, display: 'flex', alignItems: 'center', gap: 1 }}>
                  <img src="https://www.figma.com/api/mcp/asset/e59b4094-69a6-4b4c-aba1-d2446f411fe6" alt="ServiceUp" style={{ height: 22, width: 'auto' }} />
                  <span className="material-icons-outlined" style={{ fontSize: 18, color: '#9CA3AF' }}>chevron_left</span>
                </Box>

                {/* Nav items */}
                <Stack spacing={0.5}>
                  {sidebarItems.map(item => (
                    <Box key={item.label} sx={{
                      display: 'flex', alignItems: 'center', gap: 2, px: 2.5, py: 1,
                      cursor: 'pointer',
                      bgcolor: item.active ? '#F9FAFB' : 'transparent',
                      '&:hover': { bgcolor: '#F9FAFB' },
                    }}>
                      <span className="material-icons-outlined" style={{ fontSize: 22, color: item.active ? '#1A1A1A' : '#9CA3AF' }}>{item.icon}</span>
                      <Typography sx={{ fontWeight: item.active ? 700 : 400, color: item.active ? '#1A1A1A' : '#6B7280', fontSize: 14 }}>
                        {item.label}
                      </Typography>
                    </Box>
                  ))}
                </Stack>
              </Box>

              {/* Settings section at bottom */}
              <Box>
                <Divider sx={{ mx: 2.5, mb: 2 }} />
                <Typography sx={{ px: 2.5, mb: 1.5, fontWeight: 700, color: '#1A1A1A', fontSize: 13 }}>
                  Settings
                </Typography>
                <Stack spacing={0.5}>
                  {settingsItems.map(item => (
                    <Box key={item.label} sx={{
                      display: 'flex', alignItems: 'center', gap: 2, px: 2.5, py: 0.75,
                      cursor: 'pointer', '&:hover': { bgcolor: '#F9FAFB' },
                    }}>
                      <span className="material-icons-outlined" style={{ fontSize: 22, color: '#9CA3AF' }}>{item.icon}</span>
                      <Typography sx={{ color: '#6B7280', fontSize: 14 }}>
                        {item.label}
                      </Typography>
                    </Box>
                  ))}
                </Stack>
              </Box>
            </Box>

            {/* Main content area */}
            <Box sx={{ flex: 1, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', bgcolor: '#fff', pt: 20 }}>
              {/* Hero card */}
              <Box sx={{
                bgcolor: '#F5F5F5', borderRadius: 3, px: 8, py: 7,
                textAlign: 'center', maxWidth: 600,
              }}>
                <Typography sx={{ fontSize: 32, fontWeight: 800, color: '#1A1A1A', mb: 1, lineHeight: 1.2 }}>
                  Start receiving repair jobs.
                </Typography>
                <Typography variant="body1" color="text.secondary" sx={{ mb: 0.5 }}>
                  Complete the shop setup info form — that's all you need to go live.
                </Typography>
                <Typography variant="body2" color="text.secondary" sx={{ mb: 3 }}>
                  Complete required fields in each section.
                </Typography>
                <Button variant="contained" disableElevation
                  onClick={() => { setShowSettings(true); setActiveStep(0); }}
                  sx={{
                    bgcolor: '#FC6432', color: '#fff', px: 4, py: 1.5, fontSize: 15,
                    fontWeight: 600, borderRadius: 6,
                    '&:hover': { bgcolor: '#E5521A' },
                  }}>
                  Set Up My Shop – 5mins.
                </Button>
              </Box>
            </Box>
          </Box>

          {/* ── Shop Initial Setup Dialog ── */}
          <Dialog open={showSettings} onClose={() => setShowSettings(false)} maxWidth={false}
            PaperProps={{ sx: {
              width: 720, maxHeight: '90vh', display: 'flex', flexDirection: 'column',
              borderRadius: 0, overflow: 'hidden', m: 0,
            } }}>
            {/* Header */}
            <Box sx={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              px: 3, py: 2, borderBottom: '1px solid #E5E7EB',
            }}>
              <Stack direction="row" alignItems="flex-start" spacing={1.5}>
                <Box sx={{
                  width: 36, height: 36, borderRadius: '50%', bgcolor: '#FFF3EE',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                }}>
                  <span className="material-icons-outlined" style={{ color: '#FC6432', fontSize: 20 }}>settings</span>
                </Box>
                <Box>
                  <Typography fontWeight={700} sx={{ fontSize: 16, lineHeight: 1.3 }}>Shop Initial Setup</Typography>
                  <Typography variant="body2" color="text.secondary" sx={{ fontSize: 13 }}>
                    Let's get your shop set up and ready to receive service orders.
                  </Typography>
                </Box>
              </Stack>
              <Stack direction="row" alignItems="center" spacing={1.5}>
                <Box sx={{ width: 140 }}>
                  <LinearProgress variant="determinate" value={progress}
                    sx={{ height: 4, borderRadius: 2, bgcolor: '#E5E7EB',
                      '& .MuiLinearProgress-bar': { bgcolor: '#FC6432', borderRadius: 2 } }} />
                </Box>
                <Typography variant="caption" color="text.secondary" noWrap>
                  {completedSteps.size} of {stepsData.length} complete
                </Typography>
                <IconButton size="small" onClick={() => setShowSettings(false)}
                  sx={{ bgcolor: '#F3F4F6', '&:hover': { bgcolor: '#E5E7EB' } }}>
                  <span className="material-icons-outlined" style={{ fontSize: 18 }}>close</span>
                </IconButton>
              </Stack>
            </Box>

            {/* Scrollable stepper body */}
            <Box sx={{ flex: 1, overflowY: 'auto', py: 1, px: 3 }}>
              <Stack spacing={1.5}>
              {stepsData.map((step, index) => {
                const isActive = index === activeStep;
                const isCompleted = completedSteps.has(index);

                return (
                  <Box key={index} sx={{ border: '1px solid #E5E7EB' }}>
                    {/* Step row: circle + label */}
                    <Box sx={{ display: 'flex', alignItems: 'center', gap: 1.5, py: 1.5, px: 2, cursor: 'pointer',
                      '&:hover': { bgcolor: isActive ? 'transparent' : '#FAFAFA' }, transition: 'background 0.15s' }}
                      onClick={() => handleStepClick(index)}
                    >
                      <StepCircle number={index + 1} status={isCompleted ? 'completed' : isActive ? 'active' : 'inactive'} />
                      <Box sx={{ flex: 1 }}>
                        <Typography component="span" sx={{
                          fontSize: 15, fontWeight: 700,
                          color: isActive ? '#1A1A1A' : '#374151',
                        }}>
                          {step.label}
                        </Typography>
                        {step.description && (
                          <Typography component="span" sx={{ fontSize: 14, color: '#6B7280', ml: 0.5 }}>
                            – {step.description}
                          </Typography>
                        )}
                      </Box>
                      <span className="material-icons-outlined" style={{
                        fontSize: 20, color: '#9CA3AF', flexShrink: 0,
                        transform: isActive ? 'rotate(180deg)' : 'rotate(0deg)',
                        transition: 'transform 0.3s',
                      }}>expand_more</span>
                    </Box>

                    {/* Expandable content */}
                    <Collapse in={isActive} timeout={300}>
                      <Box sx={{ pl: 7.75, pr: 2, pb: 2.5 }}>
                        <Box sx={{ mb: 3 }}>
                          {step.fields === 'SHOP_DETAILS_PLACEHOLDER' ? renderShopDetailsFields() : step.fields === 'SERVICES_PLACEHOLDER' ? renderServicesFields() : step.fields}
                        </Box>
                        <Stack direction="row" justifyContent="flex-end" spacing={1.5}>
                          {index > 0 && (
                            <Button variant="text" onClick={handleBack}
                              sx={{ color: '#374151', fontWeight: 500, '&:hover': { bgcolor: '#F3F4F6' } }}>
                              Back
                            </Button>
                          )}
                          <Button variant="contained" disableElevation onClick={handleNext}
                            disabled={!isStepValid(index)}
                            sx={{
                              bgcolor: '#FC6432', color: '#fff', px: 3, borderRadius: 2,
                              '&:hover': { bgcolor: '#E5521A' },
                              '&.Mui-disabled': { bgcolor: '#E5E7EB', color: '#9CA3AF' },
                            }}>
                            {index === stepsData.length - 1 ? 'Complete Setup' : 'Save And Continue'}
                          </Button>
                        </Stack>
                      </Box>
                    </Collapse>
                  </Box>
                );
              })}
              </Stack>
            </Box>

            {/* Footer */}
            <Box sx={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              px: 3, py: 1.5, borderTop: '1px solid #E5E7EB', bgcolor: '#FAFAFA',
            }}>
              <Stack direction="row" alignItems="center" spacing={0.75}>
                <span className="material-icons-outlined" style={{ fontSize: 14, color: '#22C55E' }}>check_circle</span>
                <Typography variant="caption" color="text.secondary">Auto-saved</Typography>
              </Stack>
            </Box>
          </Dialog>

          {/* ── Confirmation Dialog ── */}
          <Dialog open={showConfirmation} onClose={() => setShowConfirmation(false)}
            PaperProps={{ sx: { borderRadius: 0, maxWidth: 520, width: '100%', p: 0 } }}>
            {/* Header */}
            <Box sx={{
              display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between',
              px: 3, pt: 2.5, pb: 2, borderBottom: '1px solid #E5E7EB',
            }}>
              <Stack direction="row" spacing={1.5} alignItems="flex-start">
                <Box sx={{
                  width: 36, height: 36, borderRadius: '50%', bgcolor: '#F3F4F6',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, mt: 0.25,
                }}>
                  <span className="material-icons-outlined" style={{ fontSize: 20, color: '#6B7280' }}>settings</span>
                </Box>
                <Box>
                  <Typography fontWeight={700} sx={{ fontSize: 16 }}>Shop Initial Setup</Typography>
                  <Typography variant="body2" color="text.secondary">
                    Let's get your shop set up and ready to receive service orders.
                  </Typography>
                </Box>
              </Stack>
              <IconButton size="small" onClick={() => setShowConfirmation(false)}
                sx={{ mt: 0.25, '&:hover': { bgcolor: '#F3F4F6' } }}>
                <span className="material-icons-outlined" style={{ fontSize: 18 }}>close</span>
              </IconButton>
            </Box>

            {/* Body */}
            <Box sx={{ px: 3, py: 4, textAlign: 'center' }}>
              {/* Green checkmark */}
              <Box sx={{
                width: 56, height: 56, borderRadius: '50%', bgcolor: '#22C55E',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                mx: 'auto', mb: 2,
              }}>
                <span className="material-icons-outlined" style={{ fontSize: 32, color: '#fff' }}>check</span>
              </Box>

              <Typography fontWeight={700} sx={{ fontSize: 18, mb: 1 }}>You're All Set!</Typography>
              <Typography variant="body2" color="text.secondary" sx={{ mb: 3 }}>
                Your shop profile is now active and you can start receiving service orders immediately.
              </Typography>

              {/* Recommended Next Steps */}
              <Box sx={{
                bgcolor: '#F9FAFB', border: '1px solid #E5E7EB', px: 3, py: 2.5,
                textAlign: 'left',
              }}>
                <Typography fontWeight={700} sx={{ fontSize: 14, mb: 1.5, textAlign: 'center' }}>
                  Recommended Next Steps
                </Typography>
                <Box component="ul" sx={{ m: 0, pl: 2.5 }}>
                  <Typography component="li" variant="body2" color="text.secondary" sx={{ mb: 0.5 }}>
                    Expand your services to get matched with more orders
                  </Typography>
                  <Typography component="li" variant="body2" color="text.secondary" sx={{ mb: 0.5 }}>
                    Add certifications to build trust with fleet customers
                  </Typography>
                  <Typography component="li" variant="body2" color="text.secondary">
                    Upload shop photos to make a strong first impression
                  </Typography>
                </Box>
              </Box>

              {/* CTA Button */}
              <Button variant="contained" disableElevation fullWidth
                sx={{
                  mt: 3, bgcolor: '#FC6432', color: '#fff', py: 1.5, fontSize: 15,
                  fontWeight: 600, borderRadius: 6,
                  '&:hover': { bgcolor: '#E5521A' },
                }}>
                Enhance Your Shop Profile
              </Button>
            </Box>
          </Dialog>
        </ThemeProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
